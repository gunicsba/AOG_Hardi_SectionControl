name: Build AOG-TUVR Bridge

on:
  push:
    tags:
      - 'v*'  # Trigger on tags starting with 'v' (e.g., v1.0, v2.1.3)

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyserial
        
    - name: Build executable
      run: |
        $TAG = "${env:GITHUB_REF_NAME}"
        $EXE_NAME = "AOG-TUVR-Bridge-$TAG"

        $ICON_FLAG = ""
        if (Test-Path "icon.ico") {
          $ICON_FLAG = "--icon=icon.ico"
          Write-Host "Using icon: icon.ico"
        } else {
          Write-Host "WARNING: icon.ico not found!"
        }
        pyinstaller --onefile --console --name "$EXE_NAME" $ICON_FLAG "AOG_TUVR_bridge.py"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AOG-TUVR-Bridge
        path: dist/AOG-TUVR-Bridge-${{ github.ref_name }}.exe
        
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/AOG-TUVR-Bridge-${{ github.ref_name }}.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
